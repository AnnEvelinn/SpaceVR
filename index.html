<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Arcade Shooter</title>
  <style>
    /* Reset margins and hide scrollbars for a full-screen game */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #1a1a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      user-select: none;
    }

    /* Score UI */
    #score-board {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    /* Game Over Screen */
    #game-over-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none; /* Hidden by default */
      background: rgba(0, 0, 0, 0.8);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    }

    #game-over-screen h1 { margin: 0 0 10px 0; color: #ff3333; font-size: 48px; }
    #game-over-screen p { font-size: 24px; margin: 0 0 20px 0; }
    
    button {
      padding: 15px 30px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 5px;
      transition: background-color 0.2s;
    }
    
    button:hover { background-color: #cccccc; }
  </style>
</head>
<body>

  <div id="score-board">Score: <span id="score">0</span></div>
  
  <div id="game-over-screen">
    <h1>GAME OVER</h1>
    <p>Final Score: <span id="final-score">0</span></p>
    <button id="restart-btn">Play Again</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Make canvas full screen
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Handle window resizing
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // UI Elements
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('final-score');
    const gameOverScreen = document.getElementById('game-over-screen');
    const restartBtn = document.getElementById('restart-btn');

    // Game Objects
    class Player {
      constructor(x, y, radius, color) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.speed = 5;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
      update(keys) {
        if (keys['w'] || keys['ArrowUp']) this.y -= this.speed;
        if (keys['s'] || keys['ArrowDown']) this.y += this.speed;
        if (keys['a'] || keys['ArrowLeft']) this.x -= this.speed;
        if (keys['d'] || keys['ArrowRight']) this.x += this.speed;

        // Keep player inside canvas bounds
        this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
        
        this.draw();
      }
    }

    class Projectile {
      constructor(x, y, radius, color, velocity) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.velocity = velocity;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
      update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.draw();
      }
    }

    class Enemy {
      constructor(x, y, radius, color, speed) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.speed = speed;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
      update(player) {
        // Calculate direction towards player
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
        this.draw();
      }
    }

    // Game State Variables
    let player;
    let projectiles = [];
    let enemies = [];
    let score = 0;
    let animationId;
    let spawnInterval;
    let isGameOver = false;

    // Input Tracking
    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

    // Shooting Mechanics
    window.addEventListener('mousedown', (e) => {
      if (isGameOver) return;
      
      const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
      const velocity = {
        x: Math.cos(angle) * 10,
        y: Math.sin(angle) * 10
      };
      projectiles.push(new Projectile(player.x, player.y, 5, '#ffff00', velocity));
    });

    // Enemy Spawner
    function spawnEnemies() {
      spawnInterval = setInterval(() => {
        const radius = Math.random() * 15 + 10;
        let x, y;

        // Spawn off-screen randomly
        if (Math.random() < 0.5) {
          x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
          y = Math.random() * canvas.height;
        } else {
          x = Math.random() * canvas.width;
          y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
        }

        const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
        const speed = Math.random() * 2 + 1; // Speed between 1 and 3

        enemies.push(new Enemy(x, y, radius, color, speed));
      }, 1000); // Spawn an enemy every second
    }

    // Core Game Initialization
    function init() {
      player = new Player(canvas.width / 2, canvas.height / 2, 15, '#00ff00');
      projectiles = [];
      enemies = [];
      score = 0;
      scoreEl.innerHTML = score;
      isGameOver = false;
      gameOverScreen.style.display = 'none';
      
      clearInterval(spawnInterval);
      spawnEnemies();
      animate();
    }

    // Main Game Loop
    function animate() {
      animationId = requestAnimationFrame(animate);
      
      // Clear previous frame
      ctx.fillStyle = 'rgba(26, 26, 26, 0.3)'; // Creates a trailing effect
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      player.update(keys);

      // Update and draw projectiles
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.update();

        // Remove projectiles off-screen
        if (p.x + p.radius < 0 || p.x - p.radius > canvas.width || p.y + p.radius < 0 || p.y - p.radius > canvas.height) {
          projectiles.splice(i, 1);
        }
      }

      // Update enemies and handle collisions
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.update(player);

        // Collision Check: Enemy hits Player
        const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
        if (distToPlayer - enemy.radius - player.radius < 1) {
          cancelAnimationFrame(animationId);
          clearInterval(spawnInterval);
          isGameOver = true;
          finalScoreEl.innerHTML = score;
          gameOverScreen.style.display = 'block';
        }

        // Collision Check: Projectile hits Enemy
        for (let j = projectiles.length - 1; j >= 0; j--) {
          const projectile = projectiles[j];
          const distToEnemy = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);

          if (distToEnemy - enemy.radius - projectile.radius < 1) {
            // Remove both and increase score
            enemies.splice(i, 1);
            projectiles.splice(j, 1);
            score += 10;
            scoreEl.innerHTML = score;
            break; // Move to the next enemy
          }
        }
      }
    }

    // Restart Button Listener
    restartBtn.addEventListener('click', () => {
      init();
    });

    // Start the game!
    init();

  </script>
</body>
</html>
