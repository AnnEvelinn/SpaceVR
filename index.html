<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>3D Shapes Gallery with WASD</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-box position="-2 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>

      <a-sphere position="0 1.25 -4" radius="1.25" color="#EF2D5E"></a-sphere>

      <a-cylinder position="2 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>

      <a-cone position="-4 1 -4" radius-bottom="1" radius-top="0" height="2" color="#7BC8A4"></a-cone>

      <a-torus position="4 1 -4" radius="1" radius-tubular="0.1" color="#9C27B0"></a-torus>

      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#555555"></a-plane>

      <a-sky color="#ECECEC"></a-sky>

      <a-entity camera look-controls wasd-controls="acceleration: 15" position="0 1.6 0"></a-entity>

    </a-scene>
  </body>
</html>
