<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Alien Shooter - WASD & Restart</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script>
      function playLaserSound() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return; 
        const audioCtx = new AudioContext();
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15); 
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15); 
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.15);
      }

      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.player = document.querySelector('#player');
          this.scoreText = document.querySelector('#score-display');
          this.gameOverText = document.querySelector('#game-over-display');
          this.alienContainer = document.querySelector('#alien-container');
          this.restartBtn = document.querySelector('#restart-btn');
          
          // Play laser on click (unless clicking the restart button)
          this.el.addEventListener('click', (evt) => {
            if (!this.isGameOver && evt.target !== this.restartBtn) {
              playLaserSound();
            }
          });

          // Restart button logic
          this.restartBtn.addEventListener('click', () => {
            if (this.isGameOver) {
              this.startGame();
            }
          });
          
          this.startGame();
        },

        startGame: function() {
          this.score = 0;
          this.isGameOver = false;
          
          // Reset UI
          this.scoreText.setAttribute('value', `Score: ${this.score}`);
          this.gameOverText.setAttribute('value', '');
          
          // Hide and disable restart button
          this.restartBtn.setAttribute('visible', 'false');
          this.restartBtn.classList.remove('clickable');
          
          // Reset player position
          this.player.setAttribute('position', '0 1.6 0');

          // Spawn initial wave
          for (let i = 0; i < 5; i++) {
            setTimeout(() => this.spawnAlien(), i * 1000);
          }
        },

        spawnAlien: function () {
          if (this.isGameOver) return; 

          let alien = document.createElement('a-sphere');
          alien.setAttribute('color', '#39FF14');
          alien.setAttribute('radius', '0.5');
          // We add 'alien' class to find them easily for collision detection
          alien.setAttribute('class', 'clickable alien'); 
          
          let angle = Math.random() * Math.PI * 2;
          let distance = 20;
          let startX = Math.cos(angle) * distance;
          let startZ = Math.sin(angle) * distance;
          let startY = Math.random() * 4 + 1; 
          
          // Shift spawn point based on where the player is currently standing
          let playerPos = this.player.object3D.position;
          alien.setAttribute('position', `${startX + playerPos.x} ${startY} ${startZ + playerPos.z}`);

          let speed = Math.floor(Math.random() * 4000) + 4000; 
          
          // Aim for where the player is standing RIGHT NOW
          alien.setAttribute('animation', `property: position; to: ${playerPos.x} ${playerPos.y} ${playerPos.z}; dur: ${speed}; easing: linear;`);

          // Shoot logic
          alien.addEventListener('click', () => {
            if (this.isGameOver) return;
            alien.parentNode.removeChild(alien);
            this.score += 10;
            this.scoreText.setAttribute('value', `Score: ${this.score}`);
            this.spawnAlien(); 
          });

          // If animation finishes (it reached its target but missed you because you used WASD)
          alien.addEventListener('animationcomplete', () => {
            if (alien.parentNode && !this.isGameOver) {
              alien.parentNode.removeChild(alien);
              this.spawnAlien(); // It flew past you, spawn a new one!
            }
          });

          this.alienContainer.appendChild(alien);
        },

        // This built-in A-Frame function runs every single frame of the game
        tick: function () {
          if (this.isGameOver) return;

          let playerPos = this.player.object3D.position;
          let aliens = document.querySelectorAll('.alien');

          // Check distance between player and every alien
          aliens.forEach(alien => {
            let distance = alien.object3D.position.distanceTo(playerPos);
            // If an alien gets within 1.2 meters, you get hit!
            if (distance < 1.2) {
              this.triggerGameOver();
            }
          });
        },

        triggerGameOver: function () {
          this.isGameOver = true;
          
          this.scoreText.setAttribute('value', '');
          this.gameOverText.setAttribute('value', `GAME OVER\nFinal Score: ${this.score}`);
          
          // Show the restart button and make it clickable
          this.restartBtn.setAttribute('visible', 'true');
          this.restartBtn.classList.add('clickable');
          
          // Clear all aliens
          while (this.alienContainer.firstChild) {
            this.alienContainer.removeChild(this.alienContainer.firstChild);
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene game-manager>
      
      <a-assets>
        <img id="space-texture" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Starlight_VR.jpg/4096px-Starlight_VR.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#space-texture"></a-sky>
      <a-entity id="alien-container"></a-entity>

      <a-entity id="player" camera look-controls wasd-controls="acceleration: 20" position="0 1.6 0">
        
        <a-cursor color="#FF0000" raycaster="objects: .clickable"></a-cursor>

        <a-text id="score-display" value="" position="0 -0.5 -1" align="center" color="#FFFFFF" width="3"></a-text>

        <a-text id="game-over-display" value="" position="0 0.2 -1.5" align="center" color="#FF0000" width="4"></a-text>

        <a-entity 
          id="restart-btn" 
          visible="false" 
          position="0 -0.5 -1.5" 
          geometry="primitive: plane; width: 1.5; height: 0.5" 
          material="color: #FF0000" 
          text="value: RESTART; align: center; width: 5">
        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
